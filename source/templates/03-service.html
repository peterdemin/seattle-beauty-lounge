<div class="flex-col m-6">
    {% if False and service.image %}
      <div class="aspect-video shrink-0 p-1 rounded nm-flat-stone-200-lg border-2">
         <img class="w-full object-cover object-top" src="{{ service.image.url }}" alt="{{ service.title }}">
      </div>
     {% endif %}
  <div class="flex m-6">
    <div>
      <h2 class="w-full py-2 px-4 text-3xl">
        {{ service.title }}
      </h2>
      <p class="pb-4 px-4 mb-5 text-stone-900 text-base">
        {{ service.description }}
      </p>
    </div>
    <div class="px-4 flex-col shrink-0 justify-center">
       <button
           class="book-btn mb-5 p-5 aspect-square rounded-full text-2xl text-cyan-400 font-bold nm-convex-stone-200-lg"
           data-service-id="{{ service.title }}"
           data-duration="{{ service.duration_min }}"
           type=button>
               Book
       </button>
       <div class="text-stone-900 text-lg text-center">
           {{ service.duration }}
       </div>
       <div class="text-stone-900 text-lg text-center">
           {{ service.price }}
       </div>
    </div>
  </div>
</div>
